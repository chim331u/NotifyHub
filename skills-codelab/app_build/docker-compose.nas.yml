version: '3.8'

services:
  notifyhub:
    image: notifyhub:latest
    container_name: notifyhub-service
    network_mode: "bridge"
    restart: unless-stopped
    ports:
      - "30111:30111" # Mappa la porta 30111 sul NAS alla porta 30111 del container
    volumes:
      # Volume per persistere i dati in modo isolato sul NAS
      - /share/Storage/Docker/NotifyHub/data:/app/data
      # File per la lettura locale e sicura delle API Key sul NAS
      - /share/Storage/Docker/NotifyHub/data/notifyhub-secrets.json:/app/data/notifyhub-secrets.json:ro
    environment:
      - NOTIFYHUB_ENV=production
      - NOTIFYHUB_PORT=30111
